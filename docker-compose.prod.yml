version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: vortex_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vortex_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vortex_password}
      POSTGRES_DB: ${POSTGRES_DB:-vortex_hub}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vortex_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vortex_network
    restart: unless-stopped

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vortex_backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-vortex_user}:${POSTGRES_PASSWORD:-vortex_password}@postgres:5432/${POSTGRES_DB:-vortex_hub}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:-["https://yourdomain.com"]}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - vortex_network
    restart: unless-stopped
    volumes:
      - ./backend/logs:/app/logs

  # React Frontend with Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vortex_frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8000}
    ports:
      - "80:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - vortex_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  vortex_network:
    driver: bridge
