# Netlify Configuration for Vortex Hub Frontend

# Build settings
[build]
  command = "npm run build --workspace=frontend"
  functions = "backend/functions"
  publish = "frontend/dist"

# Redirect all unmatched routes to index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Custom headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache control headers for static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# API proxy (if you want to proxy API calls through Netlify)
# Uncomment and configure if using Netlify Functions or Edge Functions for API
# [[redirects]]
#   from = "/api/*"
#   to = "https://your-backend-api-url.com/api/:splat"
#   status = 200
#   force = true

# Environment variables configuration
[context.production.environment]
  VITE_API_URL = "https://your-backend-api-url.com"
  VITE_WS_URL = "wss://your-backend-api-url.com"

[context.develop.environment]
  VITE_API_URL = "http://localhost:8000"
  VITE_WS_URL = "ws://localhost:8000"
